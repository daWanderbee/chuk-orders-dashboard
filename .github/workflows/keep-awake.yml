name: Keep Streamlit awake

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min
  workflow_dispatch:          # manual run button

concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          # Streamlit health endpoint returns 200 with no auth/redirect; the hit
          # alone is enough to wake the app. Don't follow redirects, don't fail.
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 \
                 https://chukorders.streamlit.app/_stcore/health || echo "000")
          echo "health HTTP $code"
